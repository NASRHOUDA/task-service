apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: task-db-secrets
  namespace: microservices
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: task-db-secrets
    creationPolicy: Owner
  data:
    - secretKey: DB_HOST
      remoteRef:
        key: microservices/task-db
        property: host
    - secretKey: DB_PORT
      remoteRef:
        key: microservices/task-db
        property: port
    - secretKey: DB_NAME
      remoteRef:
        key: microservices/task-db
        property: name
    - secretKey: DB_USER
      remoteRef:
        key: microservices/task-db
        property: user
    - secretKey: DB_PASSWORD
      remoteRef:
        key: microservices/task-db
        property: password
