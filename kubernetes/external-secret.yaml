apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: task-service-secrets-external
  namespace: taskmanager
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: task-service-secrets
    creationPolicy: Owner
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: taskmanager/db
        property: password
    - secretKey: JWT_SECRET
      remoteRef:
        key: taskmanager/app
        property: jwt_secret
    - secretKey: INTERNAL_API_KEY
      remoteRef:
        key: taskmanager/app
        property: internal_api_key
